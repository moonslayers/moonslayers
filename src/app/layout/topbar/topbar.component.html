<header class="d-flex align-items-center justify-content-between px-2 px-md-3 border-bottom py-2">
  <div class="d-flex align-items-center gap-1 gap-md-2">
    <button class="btn btn-link p-1 p-md-2 text-body" (click)="sidebarService.toggle()"
      [attr.aria-label]="t()['aria.toggleSidebar']">
      <i class="bi-list fs-5"></i>
    </button>

    <!-- Search: Desktop (always visible) -->
    <div class="d-none d-md-flex input-group">
      <span class="input-group-text bg-body-tertiary border-0">
        <i class="bi-search"></i>
      </span>
      <input type="text" class="form-control bg-body-tertiary border-0" [placeholder]="currentPlaceholder()"
        [attr.aria-label]="t()['aria.search']"
        [ngModel]="searchService.searchTerm()" (ngModelChange)="searchService.searchTerm.set($event)">
    </div>
  </div>

  <div class="d-flex align-items-center gap-2">

    <!-- Search: Mobile (icon with dropdown) -->
    <div #dropdownContainer class="d-md-none position-relative">
      <button class="btn btn-link p-1 p-md-2 text-body" (click)="toggleSearch()" [attr.aria-label]="t()['aria.search']">
        <i class="bi-search fs-5"></i>
      </button>
      @if (searchOpen()) {
      <div class="dropdown-panel position-absolute end-0 mt-1 bg-body border rounded shadow p-2 search-mobile"
        style="width: 280px; z-index: 1060;">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-body-tertiary border-0">
            <i class="bi-search"></i>
          </span>
          <input type="text" class="form-control bg-body-tertiary border-0" [placeholder]="currentPlaceholder()"
            [attr.aria-label]="t()['aria.search']"
            [ngModel]="searchService.searchTerm()" (ngModelChange)="searchService.searchTerm.set($event)">
        </div>
      </div>
      }
    </div>

    <!-- Action buttons card -->
    <div class="d-flex align-items-center gap-1 bg-body-tertiary border rounded px-2 py-1">

      <button class="btn btn-link p-1 text-body" (click)="themeService.toggleTheme()"
        [attr.aria-label]="t()['aria.theme']">
        <i [class]="themeService.themeIcon()" class="fs-5"></i>
      </button>

      <!-- Notifications dropdown -->
      <div #dropdownContainer class="position-relative">
        <button class="btn btn-link p-1 text-body position-relative" (click)="toggleNotifications()"
          [attr.aria-label]="t()['aria.notifications']">
          <i class="bi-bell fs-5"></i>
          @if (unreadCount() > 0) {
          <span class="position-absolute top-0 mt-1 start-100 translate-middle badge rounded-pill bg-danger small">{{
            unreadCount() }}</span>
          }
        </button>
        @if (notificationsOpen()) {
        <div class="dropdown-panel dropdown-notifications position-absolute end-0 mt-1 bg-body border rounded shadow-sm"
          style="z-index: 1060;">
          <div class="p-3 border-bottom">
            <span class="fw-semibold small">{{ t()['topbar.notifications.title'] }}</span>
          </div>
          <div class="list-unstyled mb-0">
            @for (notif of mockNotifications(); track notif.textKey) {
            <div class="d-flex align-items-start gap-3 px-3 py-2 border-bottom" [class.bg-body-tertiary]="notif.unread">
              <div class="d-flex align-items-center justify-content-center flex-shrink-0"
                style="width: 36px; height: 36px;">
                <i [class]="notif.icon + ' ' + notif.colorClass + ' fs-5'"></i>
              </div>
              <div class="flex-grow-1 min-w-0">
                <div class="small">{{ t()[notif.textKey] }}</div>
                <div class="small text-secondary mt-1">{{ t()[notif.timeKey] }}</div>
              </div>
              @if (notif.unread) {
              <div class="flex-shrink-0 mt-1">
                <span class="badge rounded-pill bg-primary d-block"
                  style="width: 8px; height: 8px; padding: 0;">&nbsp;</span>
              </div>
              }
            </div>
            }
          </div>
          <div class="p-2 text-center border-top">
            <button class="btn btn-link btn-sm text-decoration-none text-body-secondary small">{{
              t()['topbar.notifications.viewAll'] }}</button>
          </div>
        </div>
        }
      </div>

      <!-- Language dropdown -->
      <div #dropdownContainer class="position-relative">
        <button class="btn btn-link p-1 text-body" (click)="toggleLanguage()" [attr.aria-label]="t()['aria.language']">
          <i class="bi-globe2 fs-5"></i>
        </button>
        @if (languageOpen()) {
        <ul class="dropdown-panel position-absolute end-0 mt-1 bg-body border rounded shadow list-unstyled mb-0 py-1"
          style="min-width: 80px; z-index: 1060;">
          <li>
            <button class="btn btn-link text-decoration-none text-body d-block w-100 text-start px-3 py-1 small"
              [class.active]="currentLang() === 'es'" (click)="selectLanguage('es')">ES</button>
          </li>
          <li>
            <button class="btn btn-link text-decoration-none text-body d-block w-100 text-start px-3 py-1 small"
              [class.active]="currentLang() === 'en'" (click)="selectLanguage('en')">EN</button>
          </li>
        </ul>
        }
      </div>

    </div>

    <!-- Profile card -->
    <a class="d-flex align-items-center gap-2 bg-body-tertiary border rounded px-3 py-1 text-decoration-none text-body"
      [routerLink]="['/profile']" routerLinkActive="text-primary">
      <i class="bi bi-person-circle fs-4"></i>
      <div class="d-none d-md-flex flex-column lh-sm">
        <span class="fw-semibold small">{{ userName }}</span>
        <span class="small text-secondary">{{ userRole }}</span>
      </div>
    </a>

  </div>
</header>
