<div class="container mt-4">
    <h1>HOLA MUNDO</h1>
    <p class="lead">Este texto cambia de color según el tema.</p>

    <!-- Tarjeta: su fondo y bordes cambian -->
    <div class="card mb-3">
        <div class="card-body">
            <h5 class="card-title">Tarjeta de ejemplo</h5>
            <p class="card-text">El fondo de esta tarjeta se ve diferente en modo oscuro.</p>
        </div>
    </div>

    <!-- Botón "light": en modo oscuro se vuelve oscuro -->
    <button class="btn btn-light me-2">Botón light</button>

    <!-- Botón primary SIN cambios (se ve igual en ambos temas) -->
    <button class="btn btn-primary me-2">Primary normal</button>

    <!-- Botón primary que SÍ podemos personalizar para modo oscuro -->
    <button class="btn btn-secondary me-2">Primary secondary</button>

    <button class="btn btn-danger me-2">Primary danger</button>

    <button class="btn btn-success me-2">Primary success</button>

    <button class="btn btn-warning me-2">Primary warning</button>

    <button class="btn btn-info me-2">Primary info</button>

    <button class="btn btn-light me-2">Primary light</button>

    <button class="btn btn-dark me-2">Primary dark</button>
</div>
