<div class="row g-3">
  @for (img of images(); track img.src; let i = $index) {
    <div class="col-6 col-md-4 col-lg-3">
      <div class="card border-0 shadow-sm overflow-hidden" 
           (click)="openImage(i)" 
           (keydown.enter)="openImage(i)" 
           (keydown.space)="openImage(i); $event.preventDefault()" 
           role="button" 
           tabindex="0">
        <img [src]="img.src" [alt]="img.alt" class="card-img-top" style="height: 180px; object-fit: cover;">
        <div class="card-footer bg-transparent border-0 px-2 py-1 small text-secondary text-truncate">
          {{ img.caption }}
        </div>
      </div>
    </div>
  }
</div>

@if (selectedImage()) {
  <div
    class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
    style="z-index: 1055; background: rgba(0,0,0,0.85);"
  >
    <div class="position-relative" (click)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()" (keydown.space)="$event.stopPropagation()" tabindex="0">
      <button
        type="button"
        class="btn-close btn-close-white position-absolute top-0 end-0 m-2"
        style="z-index: 1;"
        aria-label="Close"
        (click)="closeImage()"
      ></button>

      <div class="d-flex align-items-center gap-3 px-4">
        <button type="button" class="btn btn-outline-light btn-lg rounded-circle" (click)="prevImage()">
          <i class="bi bi-chevron-left"></i>
        </button>

        <div class="text-center">
          <img
            [src]="selectedImage()!.src"
            [alt]="selectedImage()!.alt"
            class="img-fluid d-block mx-auto"
            style="max-height: 85vh; max-width: 90vw; object-fit: contain;"
          >
          @if (selectedImage()!.caption) {
            <p class="text-white text-center mt-2 mb-0 small">{{ selectedImage()!.caption }}</p>
          }
        </div>

        <button type="button" class="btn btn-outline-light btn-lg rounded-circle" (click)="nextImage()">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
}
